articles:
  - header: "A) About"
    text: "Web app that surfaces bike and parking stations in Ghent from the city's open data API. Each station shows capacity, live availability, a copyable name, and a Google Maps preview so riders can quickly decide where to park."
  - header: "B) UI & Accessibility"
    text: |
      <ul>
      <li>Chakra UI provides semantic building blocks, theming, and responsive breakpoints with minimal custom CSS.</li>
      <li>Hidden helper text (e.g., <code>&lt;p hidden&gt;</code>) describes map previews for screen readers.</li>
      <li><code>as</code> props and rem-based sizing support better semantics and scalable typography.</li>
      <li>Axe is used during development to catch and fix accessibility issues early.</li>
      </ul>
  - header: "C) Problem & Data Source"
    text: "Using the Stad Gent open data catalog for bikes, I wanted to turn raw datasets into a practical city tool: clear lists of bike stations and parking spots that are easy to scan, compare, and locate on a map."
  - header: "D) Architecture & Validation"
    text: |
      <ul>
      <li>Next.js API routes handle fetching and routing, with Joi schemas validating incoming responses from the Ghent endpoints.</li>
      <li>Winston is used for logging validation issues or unexpected data shapes.</li>
      <li>This setup keeps the API layer small and opinionated, ideal for a focused, dataset-driven app.</li>
      </ul>
  - header: "E) Queries & Endpoints"
    text: |
      <pre><code>Bike spots
      SELECT name, bikes_in_use, bikes_available, geopoint
      ORDER BY name ASC

      Park spots
      SELECT name, description, type, categorie, totalcapacity, availablecapacity, occupation, isopennow
      WHERE (availablecapacity / totalcapacity * 100) &gt; 50 AND isopennow = 1
      ORDER BY availablecapacity DESC
      </code></pre>
      These structured queries are used to build the data.stad.gent URLs that power the bikes and parkings views.
  - header: "F) Routing & Data Fetching"
    text: |
      <ul>
      <li>/ — landing page with hero and links into the bikes and parkings flows.</li>
      <li>/bikes — shows the four Blue Bikes locations with capacity information.</li>
      <li>/parkings — lists parking spots with at least 50% availability.</li>
      <li>/parkings/[slug] — details view for a single parking, where the slug is generated from the fetched data.</li>
      <li>Most data is fetched client-side to keep it fresh; /parkings uses static generation with revalidation around every minute.</li>
      </ul>
