articles:
  - header: "A) About"
    text: "Animating text textures for my web apps using React Three Fiber. This project explores dynamic 3D text textures that can either auto-animate or respond to the cursor position, controlling the intensity of the animation in real-time."
  - header: "B) Follows"
    text: |
      <ul>
      <li>React Three Fiber for rendering 3D scenes within React</li>
      <li>Drei addons, specifically <code>Plane</code>, for easier creation of textured planes</li>
      <li>Three.js for texture management and geometry manipulation</li>
      <li>Raleway font used for my text samples</li>
      </ul>
  - header: "C) Key Feats"
    text: |
      <ul>
      <li><h3>🌊 Wave Animation Based on Cursor</h3> The 3D text texture deforms dynamically based on cursor distance from the top left of the canvas. The animation's intensity scales with the cursor's proximity to the edges, achieved via custom shaders and vertex displacement.</li>
      <li><h3>🔄 Auto-Animation Mode</h3> Enables a continuous, smooth wave effect on the text texture without requiring user interaction. This mode can be toggled, using a parameter to control the animation speed.</li>
      <li><h3>📄 Texture Handling</h3> Efficiently loads and maps textures using <code>THREE.TextureLoader</code>, ensuring optimal aspect ratio scaling on different viewports.</li>
      <li><h3>💻 Real-Time Vertex Displacement</h3> The vertex positions are recalculated every frame to create a wave effect using a combination of sinusoidal functions. For instance:</li>
      <code>const waveX1 = 0.5 * Math.sin(vertex.x + time * 2);
      const waveY1 = 0.25 * Math.sin(vertex.y * 2.5 + time * 2);
      vertex.z = targetIntensityRef.current * (waveX1 + waveY1);</code>
      </li>
      <li><h3>📐 Responsive Scaling</h3> Automatically adjusts the plane size to maintain texture quality across different screen sizes.</li>
      </ul>
