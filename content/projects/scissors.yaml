articles:
  - header: "A) About"
    text: "Collection of digital representations of a simple household object: a pair of scissors—created for my design specialization, where I had to depict one item in four different styles using different tools."
  - header: "B) Procreate Illustration"
    text: "The first piece is drawn in Procreate, with a minimalist color palette and dotted shadowing to give the scissors a soft, illustrative feel."
  - header: "C) Figma Patterns"
    text: "The second piece is an SVG created in Figma using the newer pattern and brush presets."
  - header: "D) Noise & Gradients"
    text: "The third and fourth SVGs explore background noise and gradients."
  - header: "E) Opacity & Composition"
    text: "The fifth SVG, made in Figma, plays with opacity, overlaps, and vector placement."
