articles:
  - header: "A) About"
    text: "React 3D terrain generation editor and visualiser using React-Three-Fiber, using the marching cubes algo."
  - header: "B) Frontend Recipe"
    text: |
      <ul>
      <li>React Three Fiber, a React renderer for Three.js</li>
      <li>Drei addons for React Three Fiber</li>
      <li>GLSL Noise for Simplex noise</li>
      <li>Mantine for UI components</li>
      </ul>
  - header: "C) Key Feats"
    text: |
      <ul>
      <li><h3>🧊 Marching cubes algorithm implementation</h3> Divides a volume in 3D space into cubes to approximate rendered faces for a mesh. Utilizes voxels to determine density and surface points.</li>
      <li><h3>📼 Simplex Noise</h3> A 3D noise function for randomizing terrain height values. Parameters include noiseScale, octaves, weightMultiplier, persistencePerOctave, detailPerOctave, and noiseWeight.</li>
      <li><h3>🏔️ Terracing</h3> Clamps terrain height on levels, with spacing set by <strong>terracingLevel</strong>.</li>
      <li><h3>🌈 Color Height Map</h3> Uses a .png gradient for coloring fragments in the fragment shader.</li>
      <li><h3>🍄 Visual Smoothing</h3> Smooths low-poly terrain by removing the world normal vector from height calculation in the fragment shader.</li>
      <li><h3>✨ Post Processing</h3> Effects like TiltShift, Bloom, Noise, and BrightnessContrast achieved using r3f's postprocessing wrapper.</li>
      <li><h3>🏊 Floating Effect & Mesh Rotation</h3> Uses a height vertex shader with elapsed time-based disturbance, and rotates the mesh on the y-axis.</li>
      <li><h3>🎛️ The UI</h3> Controls gradient, marching cubes, and Simplex noise parameters, and regenerates the mesh.</li>
      </ul>
